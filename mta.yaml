_schema-version: 3.3.0
ID: docusign-sf-integration
version: 1.0.0
description: "DocuSign - SAP SuccessFactors integration (single-tenant)."
parameters:
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  # CAP backend: business logic + webhook. No database — state is stored in the
  # bound Destination Service (see srv/lib/store.js).
  - name: docusign-sf-integration-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: docusign-sf-integration-auth
      - name: docusign-sf-integration-destination

  # App Router: serves the setup UI and routes /api (protected) + /webhook (public).
  - name: docusign-sf-integration-approuter
    type: approuter.nodejs
    path: app/router
    parameters:
      disk-quota: 256M
      memory: 256M
    build-parameters:
      builder: custom
      commands:
        - npm ci
        - mkdir -p resources
        - cp ../index.html ../callback.html ../configure.html ../home.html resources/
      ignore:
        - default-env.json
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: docusign-sf-integration-auth
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}

resources:
  # XSUAA secures the setup UI (single-tenant / dedicated mode).
  - name: docusign-sf-integration-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      config:
        xsappname: docusign-sf-integration-${org}-${space}
        oauth2-configuration:
          credential-types:
            - "binding-secret"
            - "x509"
          redirect-uris:
            - https://*~{app-api/app-uri}/**
      path: ./xs-security.json
    requires:
      - name: app-api

  # Destination Service: the app's persistent, secure store (replaces HANA).
  - name: docusign-sf-integration-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
